<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EnglishFlow — Input Compreensível + SRS</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
</head>
<body>

  <header class="app-header">
    <div class="brand">
      <span class="brand-icon">⟡</span>
      <span class="brand-name">EnglishFlow</span>
    </div>
    <nav class="tab-nav" role="tablist" aria-label="Módulos do sistema">
      <button class="tab-btn active" data-tab="create"     role="tab" aria-selected="true"  aria-controls="tab-create">     ✦ Criar</button>
      <button class="tab-btn"        data-tab="study"      role="tab" aria-selected="false" aria-controls="tab-study">      ▶ Estudar</button>
      <button class="tab-btn"        data-tab="review"     role="tab" aria-selected="false" aria-controls="tab-review">     ◈ Revisão</button>
      <button class="tab-btn"        data-tab="playlist"   role="tab" aria-selected="false" aria-controls="tab-playlist">   ♫ Playlist</button>
      <button class="tab-btn"        data-tab="settings"   role="tab" aria-selected="false" aria-controls="tab-settings">   ⚙ Config</button>
    </nav>
    <div class="header-stats">
      <span id="stats-due" class="stat-badge" title="Cards para revisar hoje">0 hoje</span>
    </div>
  </header>

  <main class="app-main">

    <section id="tab-create" class="tab-panel active" role="tabpanel">
      <div class="panel-header">
        <h2>Adicionar Módulo / História</h2>
        <p class="panel-sub">Escolha se quer arrastar um PDF ou simplesmente colar o texto em inglês com sua tradução.</p>
      </div>

      <form class="create-form" id="createForm" onsubmit="return false;">
        <div class="form-group">
          <label for="moduleTitle">Nome da História / Parte</label>
          <input type="text" id="moduleTitle" placeholder="Ex: Jack Hannaford — Parte 01" autocomplete="off" />
        </div>

        <div class="audio-options" style="margin-bottom: 1rem; margin-top: .5rem;">
          <label class="radio-card" id="labelModePdf">
            <input type="radio" name="inputMode" value="pdf" checked />
            <span class="radio-icon">📄</span>
            <span>Importar por PDF</span>
          </label>
          <label class="radio-card" id="labelModeText">
            <input type="radio" name="inputMode" value="text" />
            <span class="radio-icon">✍</span>
            <span>Apenas Colar Texto</span>
          </label>
        </div>

        <div class="upload-area" id="pdfDropZone">
          <p>Clique abaixo ou arraste o <strong>PDF da história</strong> para extrair as frases automaticamente</p>
          <input type="file" id="pdfFileInput" accept=".pdf" style="margin-top: 1rem;" />
        </div>
