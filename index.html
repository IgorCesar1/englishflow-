<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EnglishFlow | Input Compreensível</title>
    <link rel="stylesheet" href="style.css">
    <!-- PDF.js library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
</head>
<body>
    <nav class="navbar">
        <div class="logo">English<span>Flow</span></div>
        <div class="nav-links">
            <button onclick="showSection('upload-section')">Novo Texto</button>
            <button onclick="showSection('library-section')">Biblioteca</button>
            <button onclick="showSection('review-section')" id="review-badge-btn">Revisões <span id="review-count">0</span></button>
        </div>
    </nav>

    <main class="container">
        <!-- SEÇÃO: UPLOAD / CRIAÇÃO -->
        <section id="upload-section" class="app-section">
            <div class="card">
                <h2>Importar Conteúdo</h2>
                <div class="toggle-container">
                    <button class="toggle-btn active" id="btn-pdf" onclick="toggleInputMethod('pdf')">PDF (CIMV)</button>
                    <button class="toggle-btn" id="btn-raw" onclick="toggleInputMethod('raw')">Texto Bruto</button>
                </div>

                <div id="input-pdf" class="input-group">
                    <p class="hint">Selecione o PDF do Mairo Vergara (Jack Hannaford, etc.)</p>
                    <input type="file" id="pdf-file" accept=".pdf">
                </div>

                <div id="input-raw" class="input-group" style="display: none;">
                    <input type="text" id="raw-title" placeholder="Título da Lição">
                    <textarea id="raw-text" placeholder="Cole o texto linha a linha aqui (Inglês em uma linha, Português na outra)"></textarea>
                </div>

                <button class="btn-primary" id="process-btn">Processar e Salvar</button>
                <div id="status-msg"></div>
            </div>
        </section>

        <!-- SEÇÃO: BIBLIOTECA -->
        <section id="library-section" class="app-section" style="display: none;">
            <h2>Minhas Lições</h2>
            <div id="lessons-list" class="grid-list">
                <!-- Lições inseridas via JS -->
            </div>
        </section>

        <!-- SEÇÃO: ESTUDO (LINHA A LINHA) -->
        <section id="study-section" class="app-section" style="display: none;">
            <div class="study-header">
                <button class="btn-text" onclick="showSection('library-section')">← Voltar</button>
                <h2 id="study-title">Lição</h2>
            </div>
            
            <div class="study-container">
                <div id="line-by-line-content">
                    <!-- Conteúdo gerado via JS -->
                </div>
                
                <div class="training-text-box">
                    <h3>Texto para Treinamento</h3>
                    <div id="training-text-content"></div>
                </div>
            </div>
        </section>

        <!-- SEÇÃO: REVISÃO (SRS) -->
        <section id="review-section" class="app-section" style="display: none;">
            <h2>Revisão Espaçada (SRS)</h2>
            <div id="srs-card-container" class="card review-card">
                <!-- Card de revisão via JS -->
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
