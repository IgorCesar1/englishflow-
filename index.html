<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EnglishFlow — Input Compreensível</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="app-header">
    <div class="brand">⟡ EnglishFlow</div>
    <nav class="tab-nav">
      <button class="tab-btn active" data-tab="create">✦ Criar</button>
      <button class="tab-btn" data-tab="study">▶ Estudar</button>
      <button class="tab-btn" data-tab="review">◈ Revisão <span id="review-badge" class="hidden">0</span></button>
      <button class="tab-btn" data-tab="playlist">♫ Playlist</button>
      <button class="tab-btn" data-tab="config">⚙ Config</button>
    </nav>
  </header>

  <main class="app-main">
    <section id="tab-create" class="tab-panel active">
        <h2>Processador de Conteúdo</h2>
        <form id="mainCreateForm">
            <input type="text" id="moduleTitle" placeholder="Nome do Módulo">
            <div class="options">
                <label><input type="radio" name="importMode" value="pdf" checked> PDF</label>
                <label><input type="radio" name="importMode" value="text"> Texto</label>
            </div>
            <div id="pdfDropZone"><input type="file" id="pdfFileInput" accept=".pdf"></div>
            <div id="textInputArea" class="hidden">
                <textarea id="rawTextEn" placeholder="Inglês"></textarea>
                <textarea id="rawTextPt" placeholder="Português"></textarea>
            </div>
            <button type="button" id="btnProcessModule" class="btn">Processar</button>
        </form>
        <div id="compiledModulesGrid"></div>
    </section>
    <!-- As outras seções (study, review, etc) seguem este padrão -->
  </main>

  <div id="toast" class="toast"></div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
